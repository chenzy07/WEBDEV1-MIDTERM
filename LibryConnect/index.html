<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vintage Library</title>
<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

</head>

<body>

<div id="app">

<nav class="navbar">
    <a href="index.html"><div class="logo">📖 LibryConnect</div></a>
    <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="members.html">Members</a></li>
        <li><a href="loans.html">Loans</a></li>
        <li><a href="overdue.html">Overdue <span id="overdueBadge" class="badge">0</span></a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<div class="container">

<!-- SEARCH -->
<div id="search">
    <h2>Library Collection</h2>
    <input type="text" id="searchInput" placeholder="Search books..." onkeyup="searchBooks()">
    
    <div class="book-grid">
        <div class="book-card book">
            <img src="https://covers.openlibrary.org/b/id/7984916-L.jpg">
            <p>Harry Potter</p>
        </div>
        <div class="book-card book">
            <img src="https://covers.openlibrary.org/b/id/8231996-L.jpg">
            <p>Lord of the Rings</p>
        </div>
        <div class="book-card book">
            <img src="https://covers.openlibrary.org/b/id/8228691-L.jpg">
            <p>To Kill a Mockingbird</p>
        </div>
        <div class="book-card book">
            <img src="https://covers.openlibrary.org/b/id/8370226-L.jpg">
            <p>The Great Gatsby</p>
        </div>
    </div>
</div>

<!-- MEMBERS -->
<div id="members" style="display:none">
    <h2>Members</h2>
    <div class="card">John Doe</div>
    <div class="card">Jane Smith</div>
</div>

<!-- LOANS -->
<div id="loans" style="display:none">
    <h2>Loans</h2>
    <div class="card loan" data-due="2026-03-10">Harry Potter - John</div>
    <div class="card loan" data-due="2026-04-01">LOTR - Jane</div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
