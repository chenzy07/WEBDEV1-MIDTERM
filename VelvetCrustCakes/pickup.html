<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Crust | Pickup</title>
    <link rel="stylesheet" href="pickup.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Velvet Crust</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="design.html">Custom Cake</a>
        <a href="summary.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="login.html" class="btn-outline">Login</a>
    </div>
</nav>

<!-- PICKUP FORM -->
<section class="pickup-section container">
    <h2>Pickup Details</h2>

    <form class="pickup-form">
        <div class="form-group">
            <label for="pickup-name">Name</label>
            <input type="text" id="pickup-name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="pickup-date">Pickup Date</label>
            <input type="date" id="pickup-date">
        </div>
        <div class="form-group">
            <label for="pickup-time">Pickup Time</label>
            <input type="time" id="pickup-time">
        </div>
        <div class="form-group">
            <label for="pickup-flavor">Flavor</label>
            <select id="pickup-flavor">
                <option>Chocolate</option>
                <option>Vanilla</option>
                <option>Red Velvet</option>
            </select>
        </div>

        <button type="submit" class="btn-cream full-btn">Confirm Order</button>
    </form>
</section>

<!-- MODAL -->
<div id="cart-modal" class="modal-overlay">
    <div class="modal-box">
        <h2 id="modal-title">Confirm Pickup</h2>
        <p id="modal-msg">Confirm your pickup details?</p>

        <div class="modal-actions">
            <button id="modal-yes" class="btn-cream">Confirm</button>
            <button id="modal-no" class="btn-cream cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
