<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velvet Crust Cakes | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">Velvet Crust</div>
        <div class="nav-links">
            <a href="index.html" class="btn-cream">Home</a>
            <a href="shop.html" class="btn-cream">Shop</a>
            <a href="design.html" class="btn-cream">Custom Cake</a>
            <a href="summary.html" class="btn-cream">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html" class="btn-cream">Login</a>
        </div>
    </nav>


    <div id="cart-modal" class="modal-overlay">
        <div class="container" style="max-width: 400px; text-align: center;">
            <h2 id="modal-title">Confirm Selection</h2>
            <p id="modal-msg"></p>
            <div id="qty-box" style="display:none; margin: 20px;">
                <label>Quantity: </label>
                <input type="number" id="item-qty" value="1" min="1" style="width: 60px; padding: 5px;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="modal-yes" class="btn-cream" style="flex:1">Yes</button>
                <button id="modal-no" class="btn-cream" style="flex:1; background:rgba(255,255,255,0.2); color:white;">No</button>
            </div>
        </div>
    </div>

    <div class="container">
        <section id="home" class="page active">
            <div class="carousel">
                <img id="carousel-img" class="carousel-img" src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=1200" alt="Banner">
                <div class="carousel-overlay">
                    <h1>Artisan Crusts, Velvety Centers</h1>
                    <p>Experience the finest handcrafted cakes delivered to your door.</p>
                   <a href="design.html" class="btn-cream">Order Custom Cake</a>
                </div>
            </div>
            <h2>Trending This Week</h2>
            <div class="grid" id="trending-grid"></div>
        </section>


       
    </div>
    <script src="script.js"></script>
</body>
</html>
