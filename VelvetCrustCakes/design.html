<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Cake | Velvet Crust</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <div class="logo">Velvet Crust</div>
    <div class="nav-links">
        <a href="index.html" class="btn-cream">Home</a>
        <a href="shop.html" class="btn-cream">Shop</a>
        <a href="design.html" class="btn-cream">Custom Cake</a>
        <a href="summary.html" class="btn-cream">Cart (<span id="cart-count">0</span>)</a>
        <a href="login.html" class="btn-cream login-btn">Login</a>
    </div>
</nav>

<div class="container">
    <h2 style="text-align:center; margin-bottom:30px;">🎂 Design Your Cake</h2>

    <div class="grid">

        <!-- Cake Options -->
        <div class="cake-card">
            <h3>Flavor</h3>
            <select id="flavor">
                <option>Chocolate</option>
                <option>Vanilla</option>
                <option>Red Velvet</option>
            </select>
        </div>

        <div class="cake-card">
            <h3>Size</h3>
            <select id="size">
                <option value="Small">Small ($10)</option>
                <option value="Medium">Medium ($20)</option>
                <option value="Large">Large ($30)</option>
            </select>
        </div>

        <div class="cake-card">
            <h3>Frosting</h3>
            <select id="frosting">
                <option>Buttercream</option>
                <option>Whipped Cream</option>
                <option>Cream Cheese</option>
            </select>
        </div>

        <!-- Add-ons -->
       <div class="cake-card">
    <h3>Add-ons</h3>
    <select id="addons">
        <option value="">None</option>
        <option value="Fruits">Fruits 🍓</option>
        <option value="Sprinkles">Sprinkles ✨</option>
        <option value="Chocolate Drip">Chocolate Drip 🍫</option>
    </select>
</div>

        <!-- Message -->
        <div class="cake-card" style="grid-column: span 2;">
            <h3>Message on Cake</h3>
            <input type="text" id="message" placeholder="Happy Birthday!">
        </div>

    </div>

    <!-- Summary Box -->
    <div class="cake-card" style="margin-top:30px; text-align:center;">
        <h3>Total Price</h3>
        <h1>$<span id="price">10</span></h1>
        <button class="btn-cream" onclick="addCustomCake()">Add to Cart</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
