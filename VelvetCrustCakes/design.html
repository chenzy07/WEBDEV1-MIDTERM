<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Cake | Velvet Crust</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Velvet Crust</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="design.html" class="active">Custom Cake</a>
        <a href="summary.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="login.html" class="btn-outline">Login</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero-design">
    <div class="hero-text">
        <h1>🎂 Design Your Dream Cake</h1>
        <p>Choose flavor, size, frosting, add-ons, and even a custom message.</p>
    </div>
</section>

<!-- DESIGN FORM -->
<section class="design-form">
    <div class="grid">

        <!-- Flavor -->
        <div class="cake-card">
            <h3>Flavor</h3>
            <select id="flavor">
                <option>Chocolate</option>
                <option>Vanilla</option>
                <option>Red Velvet</option>
            </select>
        </div>

        <!-- Size -->
        <div class="cake-card">
            <h3>Size</h3>
            <select id="size">
                <option value="Small">Small ($10)</option>
                <option value="Medium">Medium ($20)</option>
                <option value="Large">Large ($30)</option>
            </select>
        </div>

        <!-- Frosting -->
        <div class="cake-card">
            <h3>Frosting</h3>
            <select id="frosting">
                <option>Buttercream</option>
                <option>Whipped Cream</option>
                <option>Cream Cheese</option>
            </select>
        </div>

        <!-- Add-ons -->
        <div class="cake-card">
            <h3>Add-ons</h3>
            <select id="addons">
                <option value="">None</option>
                <option value="Fruits">Fruits 🍓</option>
                <option value="Sprinkles">Sprinkles ✨</option>
                <option value="Chocolate Drip">Chocolate Drip 🍫</option>
            </select>
        </div>

        <!-- Message -->
        <div class="cake-card message-card">
            <h3>Message on Cake</h3>
            <input type="text" id="message" placeholder="Happy Birthday!">
        </div>

    </div>

    <!-- TOTAL PRICE -->
    <div class="total-card">
        <h3>Total Price</h3>
        <h1>$<span id="price">10</span></h1>
        <button class="btn-cream" onclick="addCustomCake()">Add to Cart</button>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
