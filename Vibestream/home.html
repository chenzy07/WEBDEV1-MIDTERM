<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCS Music</title>
<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    padding-bottom: 100px; 
}

.header {
    height: 75px;
    display: flex;
    align-items: center;
    padding: 0 30px;
    background: #181818;
    gap: 20px;
}

.header .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-size: 24px;
}

.header .logo:hover {
    color: white;
}

.search-container {
    flex: 1;                 
    max-width: 500px;      
    margin: 0 auto;       
    display: flex;
    background-color: #212121;
    border-radius: 30px;
    overflow: hidden;
}

.search-container input {
    flex: 1;
    padding: 12px 20px;
    border: none;
    outline: none;
    background: transparent;
    color: white;
    font-size: 16px;
}

.search-container button {
    background-color: #303030;
    border: none;
    color: white;
    padding: 0 20px;
    cursor: pointer;
}

.main {
    display: flex;
    margin-top: 20px;
    gap: 20px;
}

.outer-left {
    width: 200px;
    background: #1e1e1e;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: calc(100vh - 75px);
}

.outer-left a {
    text-decoration: none;
    color: white;
    font-size: 16px;
    padding: 10px 15px;
    border-radius: 6px;
    transition: background 0.2s;
}

.outer-left a:hover {
    background: #333;
}

.center {
    flex: 1;
    padding: 30px;
}

.center h1 {
    font-size: 32px;
    margin-top: 0;
}

.center p {
    font-size: 18px;
    color: #aaa;
}

.music-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.music-card {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
    padding: 8px;
    border-radius: 10px;
    background: #181818;
    transition: transform 0.2s;
}

.music-card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 12px;
    background: linear-gradient(45deg, #00f7ff, #ff00ff, #00f7ff);
    z-index: -1;
    filter: blur(8px);
    opacity: 0;
    transition: opacity 0.3s;
}

.music-card img {
    width: 100%;
    border-radius: 8px;
    object-fit: cover;
}

.music-card:hover {
    transform: scale(1.05);
}

.music-card:hover::before {
    opacity: 1;
}
.music-card .title {
    font-weight: bold;
    font-size: 14px;
}

.music-card .artist {
    font-size: 12px;
    color: #aaa;
}

.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 90px;
    background: #181818;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 30px;
    box-sizing: border-box;
}

.player .cover {
    width: 60px;
    height: 60px;
    margin-right: 10px;
}

.controls {
    display: flex;
    align-items: center;
    gap: 15px;
}

.controls button {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

input[type="range"] {
    cursor: pointer;
}

.volume {
    display: flex;
    align-items: center;
    gap: 5px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px; 
    text-decoration: none;
    color: white;
    font-size: 24px;
}

.logo-img {
    height: 50px;   
    width: auto;
}

.user-profile {
    margin-left: auto; 
}

.user-profile img {
    width: 40px;
    height: 40px;
    border-radius: 50%;   
    object-fit: cover;
    cursor: pointer;
    border: 2px solid #333;
    transition: transform 0.2s;
}

.user-profile img:hover {
    transform: scale(1.05);
}

.mini-explore {
    display: flex;
    justify-content: left;   
    gap: 12px;
    margin: 15px 0 30px 0;
}


.mini-card {
    padding: 8px 18px;
    background: #1e1e1e;
    border-radius: 20px;       
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s, box-shadow 0.3s;
    white-space: nowrap;        
}


.mini-card:hover {
    background: #2a2a2a;
    transform: scale(1.05);
    box-shadow: 0 0 8px rgba(0, 247, 255, 0.4);
}

.add-playlist {
    background: #2a2a2a;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    text-align: left;
    transition: background 0.2s, transform 0.2s;
}

.add-playlist:hover {
    background: #3a3a3a;
    transform: scale(1.03);
}

.playlist-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
}

.playlist-list a {
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 5px;
}

.playlist-list a:hover {
    background: #333;
}
</style>
</head>
