<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | Nexus Events</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <body data-page="tickets">
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="index.html">Nexus Events</a>
      <nav class="nav-links">
        <a href="index.html" data-nav="home">Home</a>
        <a href="events.html" data-nav="events">Events</a>
        <a href="tickets.html" data-nav="tickets">Tickets</a>
        <a href="venue.html" data-nav="venue">Venue</a>
        <a href="contact.html" data-nav="contact">Contact</a>
        <a href="admin-login.html" data-nav="admin">Admin</a>
      </nav>
      <button class="btn btn--ghost" type="button" data-party-toggle>Party Mode: OFF</button>
    </div>
  </header>
  <div class="ticker">
    <span>NEW DROP: NEXUS NOISE WEEKENDER · TICKETS LIVE · VENUE MAP UPDATED · POP-UP MERCH LAB ·</span>
  </div>


  <main class="container" style="margin-top:2rem;">
  <div class="panel" style="max-width:500px; margin:0 auto; padding:2rem;">
    <h1 class="section-title" style="text-align:center;">Checkout</h1>

    <form id="checkoutForm">
      <label>Full Name
        <input type="text" name="name" required>
      </label>
      <label>Email
        <input type="email" name="email" required>
      </label>

      <h2>Tickets</h2>
      <div id="ticketSummary"></div>

      <button type="submit" class="btn btn--primary" style="margin-top:1rem;">Generate QR Code</button>
    </form>

    <div id="qrContainer" style="margin-top:2rem; display:none; text-align:center;"></div>
  </div>
</main>

<footer class="footer">
    <div class="container footer-inner">
      <p class="pill">Nexus Events · Tickets Desk</p>
      <p>© <span data-year></span> Nexus Events by chatgpt. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/app.js" defer></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const tickets = JSON.parse(decodeURIComponent(urlParams.get("tickets") || "[]"));
    const ticketSummary = document.getElementById("ticketSummary");

    let total = 0;
    tickets.forEach(t => {
      const div = document.createElement("div");
      div.textContent = `${t.type} x ${t.qty} - $${t.price * t.qty}`;
      ticketSummary.appendChild(div);
      total += t.price * t.qty;
    });

    const form = document.getElementById("checkoutForm");
    form.addEventListener("submit", e => {
      e.preventDefault();
      const name = form.name.value.trim();
      const email = form.email.value.trim();
      if(!name || !email) return alert("Please fill all fields.");

      const ticketInfo = `Name: ${name}\nEmail: ${email}\nTickets:\n` +
        tickets.map(t => `${t.type} x ${t.qty}`).join("\n") +
        `\nTotal: $${total}`;

      const qrContainer = document.getElementById("qrContainer");
      qrContainer.innerHTML = "";
      qrContainer.style.display = "block";

      new QRCode(qrContainer, {
        text: ticketInfo,
        width: 250,
        height: 250
      });

      form.style.display = "none";
    });
  </script>
</body>
</html>
