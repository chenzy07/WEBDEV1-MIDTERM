<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SwiftCart - Checkout</title>
<link rel="stylesheet" href="style.css">
<style>
/* Checkout page grid layout */
.checkout-container {
  display: flex;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

.checkout-items {
  flex: 2;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.checkout-card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.checkout-card h4 {
  font-size: 16px;
  margin-bottom: 5px;
}

.checkout-card p {
  font-weight: 600;
  margin-bottom: 10px;
}

.checkout-card button {
  width: 100%;
  padding: 8px;
  background: #ef4444;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.checkout-card button:hover {
  background: #dc2626;
}

/* Summary section */
.checkout-summary {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 12px;
  height: fit-content;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.checkout-summary h3 {
  margin-bottom: 15px;
}

.checkout-summary p {
  font-size: 18px;
  margin-bottom: 15px;
}

.checkout-summary button {
  width: 100%;
  margin-bottom: 10px;
}

#cart-count {
  background: #ef4444;
  color: white;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 50%;
  position: absolute;
  top: 0;
  right: -5px;
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">SwiftCart</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="cart.html">Shop</a></li>
    <li><a href="checkout.html">Checkout</a></li>
  </ul>
  <div class="nav-right" style="position:relative;">
    <a href="login.html">Login</a>
    <button id="darkModeToggle">🌙</button>
    <div style="position:relative; margin-left:10px; cursor:pointer;">
      🛒 Cart
      <span id="cart-count">0</span>
    </div>
  </div>
</nav>

<div class="checkout-container">
  <!-- Items -->
  <div class="checkout-items" id="checkout-items">
    <!-- JS inserts products here -->
  </div>

  <!-- Summary -->
  <div class="checkout-summary">
    <h3>Order Summary</h3>
    <p>Total: $<span id="cart-total">0</span></p>
    <button class="checkout-btn" onclick="checkout()">Proceed to Payment</button>
    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
    <p id="empty-msg" style="margin-top:10px; color:#555;"></p>
  </div>
</div>



<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const checkoutItemsEl = document.getElementById('checkout-items');
const cartTotalEl = document.getElementById('cart-total');
const cartCountEl = document.getElementById('cart-count');
const emptyMsgEl = document.getElementById('empty-msg');

function renderCart() {
  checkoutItemsEl.innerHTML = '';
  let total = 0;

  if(cart.length === 0){
    emptyMsgEl.textContent = "Your cart is empty!";
  } else {
    emptyMsgEl.textContent = "";
  }

  cart.forEach((item, index) => {
    total += item.price * item.quantity;
    const card = document.createElement('div');
    card.className = 'checkout-card';
    card.innerHTML = `
      <h4>${item.name}</h4>
      <p>$${item.price} x ${item.quantity}</p>
      <button onclick="removeItem(${index})">Remove</button>
    `;
    checkoutItemsEl.appendChild(card);
  });

  cartTotalEl.textContent = total.toFixed(2);
  cartCountEl.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function clearCart() {
  cart = [];
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function checkout() {
  if(cart.length === 0){
    alert("Your cart is empty!");
    return;
  }
  alert("Thank you for your purchase! Total: $" + cartTotalEl.textContent);
  clearCart();
}

// Initial render
renderCart();
</script>
<script src="script.js"></script>

</body>
</html>
