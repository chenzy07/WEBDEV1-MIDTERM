<!DOCTYPE html>
<html>
<head>
<title>Create Staff</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="dash-navbar">
  <div class="nav-left">
    <div class="logo">🏥 HealthSync Admin</div>

    <nav class="dash-links">
      <a href="admin.html">Dashboard</a>
      <a href="create-staff.html">Create Staff</a>
    </nav>
  </div>

  <div class="nav-right">
    <span class="user-info">
      <span data-auth-name></span> • <span data-auth-role></span>
    </span>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<main class="portal-shell">

  <section class="panel">
    <p class="eyebrow">Staff Management</p>
    <h3>Manage Clinic Staff</h3>

    <!-- STAFF LIST -->
    <div class="task-list" id="staffList"></div>

    <!-- ADD STAFF -->
    <div class="create-row">
      <input type="text" id="newStaffName" placeholder="Staff Name">
      <input type="text" id="newStaffRole" placeholder="Role / Department">
      <button class="submit-button" type="button" onclick="createStaff()">Add</button>
    </div>

  </section>

</main>

<script src="auth.js"></script>

<script>
const staffListEl = document.getElementById("staffList");

// CREATE STAFF
function createStaff() {
  const name = document.getElementById("newStaffName").value.trim();
  const role = document.getElementById("newStaffRole").value.trim();

  if (!name || !role) {
    alert("Please enter both name and role.");
    return;
  }

  addStaffToUI(name, role);

  document.getElementById("newStaffName").value = "";
  document.getElementById("newStaffRole").value = "";
}

// ADD TO UI
function addStaffToUI(name, role) {
  const staffItem = document.createElement("div");
  staffItem.className = "list-item";

  staffItem.innerHTML = `
    <div>
      <strong>${name}</strong>
      <small>${role}</small>
    </div>
    <div class="helper-row">
      <button class="submit-button" onclick="deleteStaff(this)">Delete</button>
    </div>
  `;

  staffListEl.appendChild(staffItem);
}

// DELETE STAFF
function deleteStaff(btn) {
  if (confirm("Delete this staff?")) {
    btn.closest(".list-item").remove();
  }
}

// DEFAULT DATA
addStaffToUI("Dr. Angela Reyes", "Cardiology");
addStaffToUI("Nurse John Santos", "Pediatrics");
</script>

</body>
</html>
