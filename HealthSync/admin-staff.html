<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Management | HealthSync Clinic</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body data-protected-role="admin">
  <div class="page-bg" aria-hidden="true">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>
  </div>

  <header class="portal-header">
    <div class="brand-block">
      <div class="brand-mark">HS</div>
      <div>
        <p class="eyebrow">Admin Portal</p>
        <h1>HealthSync Clinic</h1>
      </div>
    </div>
    <nav class="header-nav">
      <a class="nav-link" href="index.html">Public Website</a>
      <a class="nav-link" href="admin-dashboard.html">Dashboard</a>
      <a class="nav-link" href="login.html">Switch Account</a>
      <button class="logout-button" type="button" data-logout>Log Out</button>
    </nav>
  </header>

  <main class="portal-shell">
    <section class="panel">
      <p class="eyebrow">Staff Management</p>
      <h3>Manage Clinic Staff</h3>

      <div class="task-list" id="staffList">
        <!-- Example staff -->
        <div class="list-item">
          <strong>Dr. Angela Reyes</strong>
          <small>Cardiology</small>
          <div class="helper-row">
            <button class="submit-button" type="button" onclick="deleteStaff('Dr. Angela Reyes')">Delete</button>
          </div>
        </div>
        <div class="list-item">
          <strong>Nurse John Santos</strong>
          <small>Pediatrics</small>
          <div class="helper-row">
            <button class="submit-button" type="button" onclick="deleteStaff('Nurse John Santos')">Delete</button>
          </div>
        </div>
      </div>

      <div class="helper-row" style="margin-top:16px;">
        <input type="text" id="newStaffName" placeholder="Staff Name" style="flex:1; min-height: 48px; padding:0 14px; border-radius:14px; border:1px solid var(--border);">
        <input type="text" id="newStaffRole" placeholder="Role/Department" style="flex:1; min-height: 48px; padding:0 14px; border-radius:14px; border:1px solid var(--border);">
        <button class="submit-button" type="button" onclick="createStaff()">Create Staff</button>
      </div>
    </section>
  </main>

  <script>
    const staffListEl = document.getElementById("staffList");

    function createStaff() {
      const name = document.getElementById("newStaffName").value.trim();
      const role = document.getElementById("newStaffRole").value.trim();

      if (!name || !role) {
        alert("Please enter both name and role.");
        return;
      }

      const staffItem = document.createElement("div");
      staffItem.className = "list-item";
      staffItem.innerHTML = `
        <strong>${name}</strong>
        <small>${role}</small>
        <div class="helper-row">
          <button class="submit-button" type="button" onclick="deleteStaff('${name}')">Delete</button>
        </div>
      `;

      staffListEl.appendChild(staffItem);

      // Clear inputs
      document.getElementById("newStaffName").value = "";
      document.getElementById("newStaffRole").value = "";
    }

    function deleteStaff(name) {
      const items = [...staffListEl.getElementsByClassName("list-item")];
      const item = items.find(i => i.querySelector("strong").textContent === name);
      if (item) {
        if (confirm(`Are you sure you want to delete ${name}?`)) {
          staffListEl.removeChild(item);
        }
      }
    }
  </script>
  <script src="auth.js"></script>
</body>
</html>
