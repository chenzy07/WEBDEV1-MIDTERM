<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna Vista Resort</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">Luna Vista Resort</a>
    <nav aria-label="Primary">
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About Luna Vista</a></li>
        <li><a href="reservation.html">Reservation</a></li>
		 <li><a href="login.html">Login</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <img class="hero-video" src="bg2.jpg">
    <div class="hero-shade" aria-hidden="true"></div>

    <section class="login-card" aria-label="Member login">
      <h1>Escape Starts Here</h1>
      <p>Sign in to view room rates, travel dates, and your itinerary.</p>
      <form class="login-form" id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required>

        <button type="submit" a href="reservation.html">Login</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>La Cramel Hotel @ 2026</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
